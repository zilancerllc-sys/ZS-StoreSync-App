# fly.toml app configuration file generated for zs-store-sync on 2026-06-23T20:06:30+06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zs-store-sync'
primary_region = 'sin'

[build]

[env]
  PORT = '3000'
  # Must match [access_scopes] in shopify.app.toml — /auth/login (source-store
  # authorization) grants exactly these scopes, so a missing scope here breaks
  # that data type when reading from source stores.
  SCOPES = 'read_products,write_products,read_content,write_content,read_files,write_files,read_metaobjects,write_metaobjects,read_metaobject_definitions,write_metaobject_definitions,read_discounts,write_discounts,read_online_store_navigation,write_online_store_navigation,read_customers,write_customers,read_orders,write_orders,read_draft_orders,write_draft_orders'
  SHOPIFY_APP_URL = 'https://zs-store-sync.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
